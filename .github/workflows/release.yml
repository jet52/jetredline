name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stamp version from git tag
        run: |
          VER="${GITHUB_REF_NAME#v}"
          DATE="$(date -u +%Y-%m-%d)"
          sed -i "s/^version: .*/version: ${VER}/" skills/jetredline/SKILL.md
          sed -i "s|JetRedline v[0-9][^ ]* ([0-9-]*)|JetRedline v${VER} (${DATE})|" skills/jetredline/SKILL.md
      - run: make package
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            jetredline-skill-*.zip
          generate_release_notes: true
